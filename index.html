<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Modern Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div class="score-box">SCORE: <span id="current-score">0</span></div>
            <div class="score-box">HIGH SCORE: <span id="high-score">0</span></div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="start-screen" class="overlay">
                <h1>SNAKE GAME</h1>
                <p>ใช้ปุ่ม Arrow Keys หรือ W, A, S, D ในการบังคับ</p>
                <button id="start-btn">START GAME</button>
            </div>

            <div id="game-over-screen" class="overlay hidden">
                <h1 class="game-over-text">GAME OVER</h1>
                <p>คะแนนที่คุณทำได้: <span id="final-score">0</span></p>
                <button id="restart-btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
